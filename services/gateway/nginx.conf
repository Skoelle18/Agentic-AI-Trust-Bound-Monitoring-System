worker_processes  1;

events { worker_connections  1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream registry { server registry:8001; }
  upstream proxy { server proxy:8000; }
  upstream policy { server policy:8002; }
  upstream anomaly { server anomaly:8003; }
  upstream audit { server audit:8004; }
  upstream frontend { server frontend:3000; }

  server {
    listen 80;

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/registry/ {
      proxy_pass http://registry/;
    }

    location /api/proxy/ {
      proxy_pass http://proxy/;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Upgrade $http_upgrade;
      proxy_buffering off;
    }

    location /api/policy/ {
      proxy_pass http://policy/;
    }

    location /api/anomaly/ {
      proxy_pass http://anomaly/;
    }

    location /api/audit/ {
      proxy_pass http://audit/;
    }
  }
}

